# Build Windows Store package (electron-builder target: appx → dist/*.appx) on Windows CI.
name: Windows MSIX

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-msix:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build AppX (Store package)
        run: npm run dist:win:appx

      # Optional: sign the MSIX in CI (requires repo secrets — see comments below).
      # - name: Sign MSIX (optional)
      #   if: ${{ secrets.WINDOWS_PFX_BASE64 != '' }}
      #   shell: pwsh
      #   run: |
      #     $bytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_PFX_BASE64 }}")
      #     [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", $bytes)
      #     # Use signtool from Windows SDK or SignTool task; align with your Partner Center cert.

      - name: Upload Store package artifact
        uses: actions/upload-artifact@v4
        with:
          name: take-a-break-meow-msix
          path: dist/*.appx
          if-no-files-found: error
